<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>27-box-shadow</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        div.box {
            background-color: #0006;
            height: 140px;
            margin: 2rem auto;
            width: 200px;
        }

        div.box1 {
            box-shadow: 0 0 12px #fff;
        }

        div.box2 {
            box-shadow: -10px -10px 24px 0 #fff;
        }

        div.box3 {
            box-shadow: 0 0 20px 0 #fff inset;
        }

        div.box4 {
            box-shadow: 4px 4px 0 4px #cc0,
                8px 8px 0 6px #00c,
                12px 12px 0 8px #c00
        }

        div.images {
            display: flex;
            justify-content: center;
            margin-block: 2rem;
            gap: 1rem
        }

        div.images img {
            width: 180px;
            border-radius: 8px;
        }

        /* Modifica estas clases en tu etiqueta <style> */
        img.box-shadow {
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.6) !important;
        }

        img.drop-shadow {
            filter: drop-shadow(0 10px 10px rgba(0, 0, 0, 0.8)) !important;
        }

        body main section img {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
        }

        div.images {
            display: flex;
            justify-content: center;
            margin-block: 2rem;
            gap: 2rem;
            background-color: #4a148c;
            /* Un fondo morado o claro para que resalte la sombra negra */
            padding: 2rem;
            border-radius: 12px;
        }
    </style>
</head>

<body>
    <a href="../03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256">
            <path
                d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z">
            </path>
        </svg> </a>
    <main>
        <header>
            <h1>27 Box Shadow</h1>
            <h2>Property attaches one or more shadows to an element.</h2>
        </header>
        <section>
            <h3>box-shadow: 0 0 12px #fff</h3>
            <div class="box box1"></div>
            <h3>box-shadow: -10px -10px 24px 0 #fff</h3>
            <div class="box box2"></div>
            <h3>box-shadow: 0 0 20px #fff inset</h3>
            <div class="box box3"></div>
            <h3>box-shadow: multiple</h3>
            <div class="box box4"></div>
            <h3>box-shadow VS drop-shadow()</h3>
            <div class="images">
                <img src="imgs/crash_bandicoot_act.png" width="180" class="box-shadow" alt="Crash Box Shadow">
                <img src="imgs/crash_bandicoot_act.png" width="180" class="drop-shadow" alt="Crash Drop Shadow">
            </div>
        </section>
    </main>
</body>

</html>

<head>

    <title>28-challenge-shadow</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        figure.frame {
            background: #fff;
            height: calc(22 * 30px);
            width: calc(22 * 40px);
            margin: 2rem auto;
            zoom: 0.60;
            position: relative;
        }

        div.squares {
            background: url(../03-css/imgs/square.png);
            opacity: 0.4;
            z-index: 1;
            position: absolute;
            inset: 0;
            height: 100%;
        }

        div.saitama {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            background-color: fff;
            height: 20px;
            width: 20px;
            box-shadow: 
                        100px 0 0 0 rgb(84, 84, 247),
                        120px 0 0 0 rgb(84, 84, 247),
                        140px 0 0 0 rgb(84, 84, 247),
                        160px 0 0 0 rgb(84, 84, 247),
                        180px 0 0 0 rgb(84, 84, 247),
                        200px 0 0 0 rgb(84, 84, 247),
                        202px 0 0 0 rgb(84, 84, 247),

                        60px 20px 0 0 rgb(84, 84, 247),
                        80px 20px 0 0 rgb(84, 84, 247),
                        100px 20px 0 0 rgb(84, 84, 247),
                        120px 20px 0 0 rgb(84, 84, 247),
                        140px 20px 0 0 rgb(84, 84, 247),
                        160px 20px 0 0 rgb(84, 84, 247),
                        180px 20px 0 0 rgb(84, 84, 247),
                        200px 20px 0 0 rgb(84, 84, 247),
                        220px 20px 0 0 rgb(84, 84, 247),

                        40px 40px 0 0 rgb(84, 84, 247),
                        60px 40px 0 0 rgb(84, 84, 247),
                        80px 40px 0 0 rgb(84, 84, 247),
                        100px 40px 0 0 rgb(84, 84, 247),
                        120px 40px 0 0 rgb(84, 84, 247),
                        140px 40px 0 0 rgb(84, 84, 247),
                        160px 40px 0 0 rgb(84, 84, 247),
                        180px 40px 0 0 rgb(84, 84, 247),
                        200px 40px 0 0 rgb(84, 84, 247),
                        220px 40px 0 0 rgb(84, 84, 247),
                        240px 40px 0 0 rgb(84, 84, 247)
                        
        }
    </style>
</head>

<body>
    <a href="../03-css/index.html" class="btn-home">

                d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z">

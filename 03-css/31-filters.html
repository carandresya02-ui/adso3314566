<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>31-filters</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Nosifer&display=swap');

        /* Estilos para cada caja individual */
        .caja-negra-individual {
            background-color: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            margin: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .caja-negra-individual h3 {
            color: #ffffff;
            font-family: "Brush Script MT", cursive;
            font-size: 28px;
            margin-bottom: 15px;
            text-shadow: 0 2px 10px rgba(157, 4, 213, 0.5);
        }

        /* Filtros individuales para cada caja */
        .caja-blur img {
            filter: blur(5px);
            transition: filter 0.5s ease;
        }

        .caja-blur img:hover {
            filter: none;
        }

        .caja-brightness img {
            filter: brightness(2);
            transition: filter 0.5s ease;
        }

        .caja-brightness img:hover {
            filter: none;
        }

        .caja-sepia img {
            filter: sepia();
            transition: filter 0.5s ease;
        }

        .caja-sepia img:hover {
            filter: none;
        }

        .caja-contrast img {
            filter: contrast(2);
            transition: filter 0.5s ease;
        }

        .caja-contrast img:hover {
            filter: none;
        }

        .caja-invert img {
            filter: invert();
            transition: filter 0.5s ease;
        }

        .caja-invert img:hover {
            filter: none;
        }

        .caja-saturate img {
            filter: saturate(2);
            transition: filter 0.5s ease;
        }

        .caja-saturate img:hover {
            filter: none;
        }
    </style>
</head>
<body>
    <a href="../03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path></svg>    </a>
    <main>
        <header>
            <h1>31 - Filters</h1>
            <h2>Defines visual effects (like blur and saturation).</h2>
        </header>
        <!-- Normal -->
            <div class="caja-negra-individual">
                <h3>Normal</h3>
                <img src="imgs/Crash_Bandicoot.jpeg" alt="Imagen normal">
            </div>

            <!-- Blur -->
            <div class="caja-negra-individual caja-blur">
                <h3>Blur</h3>
                <img src="imgs/Crash_Bandicoot.jpeg" alt="Imagen con blur">
            </div>

            <!-- Brightness -->
            <div class="caja-negra-individual caja-brightness">
                <h3>Brightness</h3>
                <img src="imgs/Crash_Bandicoot.jpeg" alt="Imagen con brillo">
            </div>

            <!-- Sepia -->
            <div class="caja-negra-individual caja-sepia">
                <h3>Sepia</h3>
                <img src="imgs/Crash_Bandicoot.jpeg" alt="Imagen sepia">
            </div>

            <!-- Contrast -->
            <div class="caja-negra-individual caja-contrast">
                <h3>Contrast</h3>
                <img src="imgs/Crash_Bandicoot.jpeg" alt="Imagen con contraste">
            </div>

            <!-- Invert -->
            <div class="caja-negra-individual caja-invert">
                <h3>Invert</h3>
                <img src="imgs/Crash_Bandicoot.jpeg" alt="Imagen invertida">
            </div>

            <!-- Saturate -->
            <div class="caja-negra-individual caja-saturate">
                <h3>Saturate</h3>
                <img src="imgs/Crash_Bandicoot.jpeg" alt="Imagen con saturación">
            </div>
    </main>
</body>
</html>

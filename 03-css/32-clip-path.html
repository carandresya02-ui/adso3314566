<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>32-Clip-Path</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        .clip1 {
            clip-path: polygon(20% 0%, 0% 20%, 30% 50%, 0% 80%, 20% 100%, 50% 70%, 80% 100%, 100% 80%, 70% 50%, 100% 20%, 80% 0%, 50% 30%);
            background-image: url(imgs/suzuki.jpg);
            width: 450px;
            height: 450px;
            margin: 0 auto;
        }

        .clip2 {
            clip-path: circle(50% at 50% 50%);
            background-image: url(imgs/suzuki.jpg);
            width: 400px;
            height: 400px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <a href="../03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path></svg>    </a>
    <main>
        <header>
            <h1>32 - Clip Path</h1>
            <h2>Property lets you clip an element to a basic shape.</h2>
        </header>
        <section>
            <div class="caja-negra-individual">
                <div class="clip1"></div>
                <br>
                <div class="clip2"></div>
                <br>
            </div>
        </section>
    </main>
</body>
</html>

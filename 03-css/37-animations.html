<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>37 Animations</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        main section {
            div.jungle {
                background: url(imgs/jungle.png) no-repeat center;
                border-radius: 4px;
                margin-block: 2rem;
                position: relative;
                height: 471px;
                width: 380px;
                img {
                    border-radius: 0;
                    border: none;
                    position: absolute;
                }
                img.logo {
                    top: 20px;
                    left: 30px;
                    height: 72px;
                    object-fit: contain;
                    z-index: 9;
                    width: 317px;
                    animation: 2.3s animLogo ease-in infinite;
                }
                img.dk {
                    top: 130px;
                    left: 120px;
                    width: 140px;
                    object-fit: contain;
                    z-index: 8;
                    animation: 2s animDK ease-out infinite;
                }
                div.move {
                    position: absolute;
                    top: 215px;
                    left: 0;
                    animation: 0.2s animRyno ease-in in;
                    img.ryno {
                        width: 140px;
                        object-fit: contain;
                        top: 8;
                        animation: 0.2s animRyno linear infinite;
                    }
                }
            }
        }
        @keyframes animLogo {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }
        @keyframes animDK {
            0%   { top: 130px; transform: rotateX(0deg); }
            40%  { top: 80px;  transform: rotateX(0deg); }
            50%  { top: 80px;  transform: rotateX(360deg);  }
            60%  { top: 80px;  transform: rotateX(360deg);  }
            100% { top: 130px; transform: rotateX(360deg);  }
        }
        @keyframes animRyno {
            0%, 100% { top: 0x; }
            50% { top: -8px; }
        }
    </style>
</head>
<body>
    <a href="../03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path></svg>    </a>
    <main>
        <header>
            <h1>37 Animations</h1>
            <h2>Lets an element gradually change from one style to another.</h2>
        </header>
        <section>
            <div class="jungle">
                <img src="imgs/logo-dk.png" class="logo">
                <img src="imgs/dk.png" class="dk">
                <div class="move">
                    <img src="imgs/ryno.png" class="ryno">
                </div>
            </div>
        </section>
    </main>
</body>
</html>

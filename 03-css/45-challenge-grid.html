<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>45-challenge-grid</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        /* Estilos generales del contenedor */
        body {
            background-color: #0d00a4;
            /* Fondo azul similar a la pantalla */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .grid-container {
            display: grid;
            width: 90vw;
            max-width: 600px;
            gap: 12px;
            /* Espaciado entre tarjetas */
            background-color: #111;
            /* Borde interior o fondo oscuro */
            padding: 12px;
            border-radius: 12px;

            /* Definición de filas y columnas proporcionales */
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            

            /* Matriz del dibujo */
            grid-template-areas:
                "a1 a2 a3"
                "a4 a2 a5"
                "a6 a6 a7";
        }

        /* Asignación de cada elemento a su área asignada */
        .area-1 {
            grid-area: a1;
        }

        .area-2 {
            grid-area: a2;
        }

        .area-3 {
            grid-area: a3;
        }

        .area-4 {
            grid-area: a4;
        }

        .area-5 {
            grid-area: a5;
        }

        .area-6 {
            grid-area: a6;
        }

        .area-7 {
            grid-area: a7;
        }

        /* Estilos de las tarjetas/imágenes */
        .item {
            border: 2px solid #ffffff;
            border-radius: 8px;
            overflow: hidden;
            background-color: #222;
        }

        .item img {
            width: 100%;
            height: 100%;
            border-radius: 0;
            object-fit: cover;
            display: block;
        }
    </style>
</head>

<body>
    <a href="../03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256">
            <path
                d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z">
            </path>
        </svg> </a>
    <main>
        <header>
            <h1>45 - Challenge Grid</h1>
            <h2>Irregular Gallery.</h2>
        </header>
        <section>
            <div class="grid-container">
                <div class="item area-1"><img src="imgs/grid/ani01.png" alt="1"></div>
                <div class="item area-2"><img src="imgs/grid/ani02.png" alt="2"></div>
                <div class="item area-3"><img src="imgs/grid/ani03.png" alt="3"></div>
                <div class="item area-4"><img src="imgs/grid/ani04.png" alt="4"></div>
                <div class="item area-5"><img src="imgs/grid/ani05.png" alt="5"></div>
                <div class="item area-6"><img src="imgs/grid/ani06.png" alt="6"></div>
                <div class="item area-7"><img src="imgs/grid/ani07.png" alt="7"></div>
            </div>
        </section>
    </main>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../src/css/04-js.css">
    <script>
        const message = document.getElementById('message');
        message.textContent = 'Hello World! ';
    </script>
</head>
<body>
    <a class="btn-home" href="index.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path></svg>    </a>
    <main>
        <header>
            <h1>01 - Write</h1>
            <h2>Learn to write and execute basic JavaScript code.</h2>
        </header>
        <section>
            <h3>Digital Time</h3>
            <h2 id="time">00:00:00</h2>
        </section>
    </main>
    <script>
        // This is a line comment
        const time = document.getElementById('time')
        // Add some styles
        time.style.textAlign = 'center';
        time.style.zoom      = '3.4';
        /*
            This is a block coment.
            Its used to multiple lines of code
            or inactive large portions of code
        */

        // This is a interval time
        setInterval(function() {
            let today    = new Date; // New Date
            let hours    = today getHours(); // Get Hours
            let minute   = today getMinutes(); // Get Minutes
            let seconds  = today getSeconds(); // Get seconds
            // Show time
            time textContent = '$(hours);$(minutes);(seconds)'
        }
    </script>
</body>
</html>
